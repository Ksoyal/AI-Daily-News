name: Precise Trigger

# 每 15 分钟检查一次，北京时间 8:00 准点触发主流水线
on:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check if it's 00:00 UTC (Beijing 08:00)
        id: check
        run: |
          HOUR=$(date -u +%H)
          MINUTE=$(date -u +%M)
          echo "UTC time: ${HOUR}:${MINUTE}"
          if [ "$HOUR" = "00" ] && [ "$MINUTE" -lt "15" ]; then
            echo "fire=true" >> $GITHUB_OUTPUT
            echo "✅ Within trigger window, firing main workflow..."
          else
            echo "fire=false" >> $GITHUB_OUTPUT
            echo "⏳ Not trigger time yet, skipping."
          fi

      - name: Trigger main workflow
        if: steps.check.outputs.fire == 'true'
        env:
          WORKFLOW_PAT: ${{ secrets.WORKFLOW_PAT }}
        run: |
          curl -sL -X POST \
            -H "Authorization: Bearer ${WORKFLOW_PAT}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/Ksoyal/AI-Daily-News/dispatches \
            -d '{"event_type":"daily_trigger"}'
          echo "🚀 Main workflow triggered!"
