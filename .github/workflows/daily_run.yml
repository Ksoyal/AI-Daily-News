name: AI Daily News

on:
  schedule:
    # 北京时间 8:00 = UTC 0:00（免费版不保证准时，作为兜底）
    - cron: "0 0 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [daily_trigger]

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Run daily news pipeline
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_TEMPERATURE: ${{ secrets.AI_TEMPERATURE }}
          AI_TIMEOUT: ${{ secrets.AI_TIMEOUT }}
          AI_MAX_TOKENS: ${{ secrets.AI_MAX_TOKENS }}
          AI_MAX_INPUT_CHARS: ${{ secrets.AI_MAX_INPUT_CHARS }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          PUSH_KEY: ${{ secrets.PUSH_KEY }}
        run: python main.py
